services:
  - type: web
    name: atlas-fitness-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # You will paste your key in Render dashboard
    autoDeploy: true
